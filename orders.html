<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Orders | Expresso Cake</title>
  <link rel="stylesheet" href="/styles.css?v=bakery-redesign-2">
</head>
<body>
  <header class="site-header compact">
    <div class="header-main">
      <a class="brand" href="index.html" aria-label="Cake Expresso home">
        <img src="/assets/logo.jpg" alt="Cake Expresso" class="brand-logo">
      </a>
      <nav class="header-actions">
        <a href="shop.html">Shop</a>
        <a href="checkout.html">Cart <span class="cart-count">0</span></a>
        <a href="#" id="auth-link">Login</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="page-hero" style="min-height: 200px;">
      <h1>My Orders</h1>
      <p id="user-welcome">Welcome back!</p>
    </section>
    <div id="orders-list" class="order-history-list"></div>
  </main>

  <!-- WhatsApp FAB -->
  <a href="https://wa.me/918970010111?text=Hi%2C%20I%20need%20help%20with%20my%20order!" target="_blank" class="whatsapp-fab" title="Chat on WhatsApp" aria-label="Chat on WhatsApp">
    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
  </a>

  <script src="/cart.js"></script>
  <script src="/auth.js"></script>
  <script src="/app.js"></script>
  <script>
    const TRACKING_STEPS = ['Confirmed', 'Preparing', 'Quality Check', 'Out for Delivery', 'Delivered'];

    function getStepIndex(status) {
      const map = {
        'Pending': 0, 'Confirmed': 0, 'Preparing': 1,
        'Quality Check': 2, 'Out for delivery': 3, 'Delivered': 4
      };
      return map[status] ?? 0;
    }

    function renderTimeline(status) {
      const current = getStepIndex(status);
      return `
        <div class="order-timeline">
          ${TRACKING_STEPS.map((step, i) => `
            <div class="timeline-step ${i < current ? 'done' : i === current ? 'current' : ''}">
              <div class="step-dot">${i < current ? '✓' : i + 1}</div>
              <div class="step-content">
                <strong>${step}</strong>
                <span>${i < current ? 'Completed' : i === current ? 'In progress' : 'Upcoming'}</span>
              </div>
            </div>`).join('')}
        </div>`;
    }

    function renderOrderCard(order) {
      const itemsList = Array.isArray(order.items)
        ? order.items.map(i => `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--line);">
            <span>${i.name} × ${i.quantity}</span><strong>Rs ${(i.price * i.quantity).toLocaleString('en-IN')}</strong></div>`).join('')
        : `<div>${order.items}</div>`;

      return `
        <div class="order-detail-card">
          <div class="order-detail-head">
            <div>
              <span class="order-id" style="color:rgba(255,255,255,.7); font-size:13px;">Order ID</span>
              <div style="font-size:20px; font-weight:900;">${order.id}</div>
            </div>
            <div style="text-align:right;">
              <div style="font-size:22px; font-weight:900;">Rs ${(order.total || order.amount || 0).toLocaleString('en-IN')}</div>
              <div style="font-size:12px; color:rgba(255,255,255,.7);">${order.paymentMethod || 'COD'}</div>
            </div>
          </div>
          <div class="order-detail-body">
            <div>
              <p style="font-size:12px; color:var(--muted); font-weight:900; text-transform:uppercase; margin:0 0 6px;">Delivery Info</p>
              <strong>${order.customer.name || order.customer}</strong>
              <p style="color:var(--muted); font-size:14px; margin:4px 0;">${order.customer.address || ''}</p>
              <p style="color:var(--muted); font-size:14px; margin:0;">📅 ${order.date || 'Not specified'}</p>
              ${order.customer.message ? `<p style="color:var(--accent); font-size:13px; margin-top:8px;">🎂 "${order.customer.message}"</p>` : ''}
            </div>
            <div>
              <p style="font-size:12px; color:var(--muted); font-weight:900; text-transform:uppercase; margin:0 0 6px;">Order Status</p>
              ${renderTimeline(order.status)}
            </div>
            <div class="order-items-list">
              <p style="font-size:12px; color:var(--muted); font-weight:900; text-transform:uppercase; margin:0 0 10px;">Items Ordered</p>
              ${itemsList}
              ${order.discount ? `<div class="discount-row" style="margin-top:8px;"><span>Coupon Discount</span><span>-Rs ${order.discount}</span></div>` : ''}
              <div style="display:flex; justify-content:space-between; font-weight:900; font-size:18px; margin-top:12px; color:var(--brand);">
                <span>Total Paid</span><span>Rs ${(order.total || order.amount || 0).toLocaleString('en-IN')}</span>
              </div>
            </div>
          </div>
        </div>`;
    }

    async function renderOrders() {
      const container = document.getElementById('orders-list');
      const user = window.ExpressoAuth.getUser();

      // Update auth link
      const authLink = document.getElementById('auth-link');
      if (user) {
        authLink.textContent = 'Logout';
        authLink.onclick = (e) => { e.preventDefault(); window.ExpressoAuth.logout(); location.reload(); };
      }

      // Check for order confirmation redirect
      const params = new URLSearchParams(window.location.search);
      const confirmedId = params.get('confirmed');

      if (!user) {
        container.innerHTML = `
          <div style="text-align:center; padding: 60px 20px;">
            <h2 style="font-size:28px; margin-bottom:12px;">Please log in to view your orders</h2>
            <p style="color:var(--muted); margin-bottom:24px;">Enter your email to access your account and order history.</p>
            <form id="login-form" style="display:inline-grid; gap:14px; width:340px; max-width:100%;">
              <input type="email" id="login-email" required placeholder="your@email.com"
                style="padding:14px; border:1px solid #eadfd6; border-radius:8px; font:inherit; font-size:16px;">
              <button type="submit" class="btn primary wide">Login &amp; View Orders</button>
            </form>
          </div>`;
        document.getElementById('login-form').addEventListener('submit', (e) => {
          e.preventDefault();
          const email = document.getElementById('login-email').value.trim();
          if (email) { window.ExpressoAuth.login(email); renderOrders(); }
        });
        return;
      }

      document.getElementById('user-welcome').textContent = `Welcome back, ${user.name}!`;

      // Show confirmation banner
      if (confirmedId) {
        container.innerHTML = `
          <div style="background:var(--mint); border:1px solid #a3d9c8; border-radius:12px; padding:24px; text-align:center; margin-bottom:24px;">
            <div style="font-size:40px; margin-bottom:10px;">🎉</div>
            <h2 style="color:var(--accent); margin:0 0 6px;">Order Placed Successfully!</h2>
            <p style="color:var(--muted); margin:0;">Your order <strong>${confirmedId}</strong> has been confirmed. We'll keep it fresh!</p>
          </div>`;
      } else {
        container.innerHTML = '';
      }

      try {
        const res = await fetch('/api/data');
        const data = await res.json();
        const orders = (data.orders || []).filter(o => {
          const email = typeof o.customer === 'string' ? '' : o.customer.email;
          return email === user.email;
        });

        if (!orders.length) {
          container.innerHTML += `
            <div style="text-align:center; padding:60px 20px;">
              <div style="font-size:60px; margin-bottom:16px;">🎂</div>
              <h2>No orders yet!</h2>
              <p style="color:var(--muted); margin-bottom:24px;">Browse our fresh cakes and place your first order.</p>
              <a href="shop.html" class="btn primary">Shop Now</a>
            </div>`;
          return;
        }

        container.innerHTML += orders
          .sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp))
          .map(renderOrderCard).join('');
      } catch (err) {
        container.innerHTML += '<p>Error loading orders. Please refresh.</p>';
      }
    }

    renderOrders();
  </script>
</body>
</html>
